<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMONEV BINFRASWIL</title>
    <style>
        /* ======================================================= */
        /* CSS ASLI CODE 1 (KONSISTEN & TIDAK DIUBAH)               */
        /* ======================================================= */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            min-height: 100vh;
            display: none; 
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        /* SPLASH SCREEN CSS */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0740aa 0%, #1d4ed8 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 30px;
            text-align: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .splash-logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
            margin-bottom: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            background: white;
            padding: 10px;
        }

        .splash-screen h2 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .splash-screen p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 35px;
            max-width: 320px;
            line-height: 1.5;
        }

        .btn-masuk {
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 700;
            color: #0740aa;
            background-color: #ffffff;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-masuk:active {
            transform: scale(0.95);
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #0740aa 0%, #1d4ed8 100%);
            color: white;
            padding: 20px;
        }

        .header-wrap {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: white;
            padding: 5px;
            border-radius: 12px;
        }

        .header-text-cell h1 {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
        }

        .header-text-cell p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 2px;
        }

        /* PENCARIAN & FILTER */
        .search-container {
            padding: 15px;
            background-color: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .search-flex {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            border-color: #1d4ed8;
        }

        .btn-filter-toggle {
            padding: 0 12px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-filter-toggle.active {
            background-color: #e0e7ff;
            border-color: #1d4ed8;
        }

        .filter-panel {
            display: none;
            margin-top: 12px;
            padding: 12px;
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .filter-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 4px;
        }

        .filter-select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
        }

        /* UTAMA & KARTU OPD */
        main {
            padding: 15px;
            flex: 1;
        }

        .opd-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            margin-bottom: 12px;
            overflow: hidden;
            opacity: 0; 
        }

        .opd-main-info {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 15px;
        }

        .opd-logo-cell {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opd-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
        }

        .opd-details-cell {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .opd-title {
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }

        .opd-meta {
            font-size: 12px;
            color: #64748b;
            margin-top: 2px;
            line-height: 1.3;
        }

        .pagu-total {
            font-weight: 600;
            color: #0740aa;
        }

        /* TOMBOL UTAMA */
        .btn {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary { background: #0740aa; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-orange { background: #f97316; color: white; }

        /* KONTEN KEGIATAN */
        .kegiatan-container {
            border-top: 1px solid #f1f5f9;
            background-color: #f8fafc;
            padding: 12px;
        }

        .kegiatan-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
            padding: 12px;
        }

        .kegiatan-card:last-child { margin-bottom: 0; }

        .kegiatan-main-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .kegiatan-title {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
            line-height: 1.3;
        }

        .kegiatan-pagu {
            font-size: 11.5px;
            color: #64748b;
            margin-top: 2px;
        }

        .kegiatan-sub-detail {
            display: none;
            margin-top: 12px;
            border-top: 1px dashed #e2e8f0;
            padding-top: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
        }

        .detail-label { color: #64748b; }
        .detail-value { font-weight: 500; color: #1e293b; text-align: right; max-width: 60%; }
        
        .status-badge {
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        /* SPINNER LOADING BUTTON */
        .spinner {
            width: 16px;
            height: 16px;
            border: 3px solid rgba(7, 64, 170, 0.3);
            border-radius: 50%;
            border-top-color: #0740aa;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* FOOTER & INDIKATOR PENGUNJUNG */
        footer {
            background: linear-gradient(135deg, #0740aa 0%, #1d4ed8 100%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            text-align: center;
            padding: 16px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .view-counter {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            color: #ffffff;
            gap: 6px;
            margin-top: 10px;
        }

        .view-counter svg { fill: #ffffff; width: 14px; height: 14px; }
        .view-counter span { color: #4ade80; font-weight: 600; }

        /* CONFIG HP LANDSCAPE & TABLET */
        @media screen and (min-width: 650px) {
            .container { max-width: 100% !important; }
            main {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 16px;
            }
            .opd-card { margin-bottom: 0 !important; height: max-content !important; }
        }

        /* CSS ANIMASI JATUH MANTUL */
        @keyframes jatuhMantul {
            0% { opacity: 0; transform: translateY(-240px); }
            50% { opacity: 1; transform: translateY(18px); }
            75% { transform: translateY(-6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animasi-jatuh-mantul {
            animation: jatuhMantul 0.65s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
    </style>
</head>

<body>

    <!-- Element Splash Screen Pembuka Halaman -->
    <div class="splash-screen" id="splashScreen">
        <img src="logo.png" alt="Logo Utama" class="splash-logo" onerror="this.src='https://placehold.co/150x150?text=SIMONEV';">
        <h2>SIMONEV BINFRASWIL</h2>
        <p>Progres Strong Point Mitra Bidang Infraswil Triwulan II 2026</p>
        <button class="btn-masuk" onclick="mulaiLoadingDashboard(this)">Click On Me</button>
    </div>

    <!-- Container Dashboard Utama -->
    <div class="container" id="appContainer">
        <header>
            <div class="header-wrap">
                <div class="header-logo-cell">
                    <img class="header-logo" src="logo.png" alt="Logo Utama" onerror="this.src='https://placehold.co/60x60?text=BI';">
                </div>
                <div class="header-text-cell">
                    <h1>Progres Strong Point<br>
                        Mitra Bidang Infraswil Triwulan II 2026</h1>
                    <p>Sistem Monitoring & Evaluasi (SIMONEV) BINFRASWIL</p>
                </div>
            </div>
        </header>

        <div class="search-container">
            <div class="search-flex">
                <button class="btn-filter-toggle" id="filterToggleBtn" onclick="toggleFilterPanel()" title="Saring Pilihan">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0740aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                    </svg>
                </button>
                <input type="text" id="searchInput" class="search-input" placeholder="Cari nama kegiatan...">
            </div>

            <div class="filter-panel" id="filterPanel">
                <div class="filter-grid">
                    <div class="filter-group">
                        <label>Metode Pengadaan</label>
                        <select id="filterMetode" class="filter-select">
                            <option value="">Semua Metode</option>
                            <option value="Swakelola">Swakelola</option>
                            <option value="Swakelola Type 2">Swakelola Tipe 2</option>
                            <option value="E-Purchasing">E-Purchasing</option>
                            <option value="Tender">Tender</option>
                            <option value="Seleksi">Seleksi</option>
                            <option value="RO">RO (Repeat Order)</option>
                            <option value="Pengadaan Langsung">Pengadaan Langsung</option>
                            <option value="Hibah">Hibah</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Jenis Kontrak</label>
                        <select id="filterKontrak" class="filter-select">
                            <option value="">Semua Kontrak</option>
                            <option value="Lumpsum">Lumpsum</option>
                            <option value="Harga Satuan">Harga Satuan</option>
                            <option value="Waktu Penugasan">Waktu Penugasan</option>
                            <option value="Gabungan Harga satuan & Lumpsump">Gabungan Harga Satuan & Lumpsum</option>
                            <option value="termin & lumpsump">Termin & Lumpsum</option>
                            <option value="Hibah">Hibah</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <main id="mainContent">
            <!-- Tempat data kartu ter-render otomatis -->
        </main>

        <footer>
            <div>Strong Point Progress 2026 © Copyright by @zuwlend</div>
            <div class="view-counter">
                <svg viewBox="0 0 24 24">
                    <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                </svg>
                <span id="global_visitor_count">...</span>
            </div>
        </footer>
    </div>

    <script>
        // =======================================================
        // LOGIKA CORE ASLI CODE 1 (TIDAK BERUBAH)                 
        // =======================================================
        const APPSCRIPT_URL = "https://script.google.com/macros/s/AKfycbzevC1PY9qzV7BwyGHjZCf9dlHbgMWICm3jVkM4YB5j87JAnH4Zj6A0YwCe7FT-N9s-/exec";
        let proyekData = [];
        
        const tapSound = new Audio("tap_sound.mp3");
        tapSound.preload = "auto";
        tapSound.volume = 0.5;
        let lastPlayTime = 0;
        let animasiKartuSelesai = false;

        document.addEventListener("DOMContentLoaded", function () {
            document.getElementById("global_visitor_count").innerText = "Memuat...";
            muatDataDariGoogleSheets();
        });

        function muatDataDariGoogleSheets() {
            fetch(APPSCRIPT_URL, {
                method: 'GET',
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            })
            .then(response => {
                if (!response.ok) throw new Error("Status " + response.status);
                return response.text();
            })
            .then(textData => {
                let data = JSON.parse(textData);
                if (data && data.views !== undefined) {
                    document.getElementById("global_visitor_count").innerText = parseInt(data.views).toLocaleString('id-ID');
                }

                let listMentah = Array.isArray(data) ? data : (data && data.proyek ? data.proyek : []);
                if (listMentah.length === 0) {
                    document.getElementById('mainContent').innerHTML = `<p style="text-align:center; padding:20px; color:#f59e0b; font-weight:700;">Data kosong atau tidak ditemukan.</p>`;
                    return;
                }

                const opdDiizinkan = ["DINAS SDACKTR", "DINAS BMBK", "DINAS PERHUBUNGAN", "DINAS PERKIMTAN", "DISKOMINFO", "BPBD", "BAPPELITBANGDA"];
                proyekData = listMentah.filter(item => {
                    if (!item.opd) return false;
                    let namaOPDData = item.opd.toString().trim().toUpperCase();
                    return opdDiizinkan.includes(namaOPDData);
                });

                if (proyekData.length === 0) {
                    document.getElementById('mainContent').innerHTML = `<p style="text-align:center; padding:20px; color:#f59e0b; font-weight:700;">Tidak ada data dari 7 OPD prioritas.</p>`;
                    return;
                }

                const groupedData = {};
                proyekData.forEach(item => {
                    let namaOPD = item.opd && item.opd.toString().trim() !== "" ? item.opd.toString().trim() : "LAINNYA";
                    if (!groupedData[namaOPD]) groupedData[namaOPD] = [];
                    groupedData[namaOPD].push(item);
                });

                renderData(groupedData);
            })
            .catch(err => {
                console.error("Error:", err);
                document.getElementById("global_visitor_count").innerText = "Gagal";
                document.getElementById('mainContent').innerHTML = `
                <div style="text-align:center; padding:30px; color:#ef4444;">
                    <p style="font-weight:700; margin-bottom:10px;">Gagal Memuat Data:</p>
                    <code style="background:#fee2e2; padding:5px 10px; border-radius:4px; font-size:12px; display:inline-block;">${err.message}</code>
                </div>`;
            });
        }

        function hitungTotalPagu(listKegiatan) {
            let total = 0;
            listKegiatan.forEach(keg => {
                if (keg.anggaran) {
                    let angka = parseFloat(keg.anggaran.toString().replace(/[^0-9]/g, ''));
                    if (!isNaN(angka)) total += angka;
                }
            });
            return "Rp " + total.toLocaleString('id-ID');
        }

        function renderData(groupedData) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = '';

            Object.keys(groupedData).forEach((namaOPD, index) => {
                const listKegiatan = groupedData[namaOPD];
                const idOPD = 'opd-' + index;
                const totalPaguOPD = hitungTotalPagu(listKegiatan);

                let namaBersih = namaOPD.trim();
                let cekNamaAtas = namaBersih.toUpperCase();

                if (cekNamaAtas !== "BPBD" && cekNamaAtas !== "BAPPELITBANGDA") {
                    namaBersih = namaBersih.replace(/^(dinas|biro)\s+/i, '');
                }
                const inisial = namaBersih.substring(0, 3).toUpperCase();

                let namaFileLogo = "placeholder"; 
                if (cekNamaAtas.includes("BAPPELITBANGDA")) namaFileLogo = "logo-bappelitbangda";
                else if (cekNamaAtas.includes("BMBK"))          namaFileLogo = "logo-bmbk";
                else if (cekNamaAtas.includes("BPBD"))          namaFileLogo = "logo-bpbd";
                else if (cekNamaAtas.includes("PERHUBUNGAN"))   namaFileLogo = "logo-dishub";
                else if (cekNamaAtas.includes("DISKOMINFO"))    namaFileLogo = "logo-kominfo";
                else if (cekNamaAtas.includes("PERKIMTAN"))     namaFileLogo = "logo-perkimtan"; 
                else if (cekNamaAtas.includes("SDACKTR"))       namaFileLogo = "logo-sdacktr";

                let kegiatanHtml = '';
                listKegiatan.forEach((keg, idx) => {
                    let nomorUrut = idx + 1;
                    kegiatanHtml += `
                    <div class="kegiatan-card" data-nama="${(keg.kegiatan || "").toLowerCase()}" data-metode="${(keg.metode || "").toLowerCase()}" data-kontrak="${(keg.kontrak || "").toLowerCase()}">
                        <div class="kegiatan-main-info">
                            <div class="kegiatan-text-cell">
                                <div class="kegiatan-title">${nomorUrut}. ${keg.kegiatan || "-"}</div>
                                <div class="kegiatan-pagu">Anggaran: ${keg.anggaran || "Rp 0"}</div>
                            </div>
                            <div class="kegiatan-action-cell">
                                <button class="btn btn-orange" onclick="toggleSubDetail(this)">Detail</button>
                            </div>
                        </div>
                        <div class="kegiatan-sub-detail">
                            <div class="detail-row"><div class="detail-label">Durasi Kerja</div><div class="detail-value">${keg.durasi || "-"}</div></div>
                            <div class="detail-row"><div class="detail-label">Metode Pengadaan</div><div class="detail-value">${keg.metode || "-"}</div></div>
                            <div class="detail-row"><div class="detail-label">Jenis Kontrak</div><div class="detail-value">${keg.kontrak || "-"}</div></div>
                            <div class="detail-row"><div class="detail-label">Tgl Berkontrak</div><div class="detail-value">${keg.tgl_kontrak || "-"}</div></div>
                            <div class="detail-row"><div class="detail-label">Status</div><div class="detail-value"><span class="status-badge">${keg.status || "-"}</span></div></div>
                            <div class="detail-row"><div class="detail-label">Fisik</div><div class="detail-value">${keg.fisik || "0%"}</div></div>
                            <div class="detail-row"><div class="detail-label">Keuangan</div><div class="detail-value">${keg.keuangan || "Rp 0"}</div></div>
                            <div class="detail-row"><div class="detail-label">Keterangan</div><div class="detail-value">${keg.keterangan || "-"}</div></div>
                        </div>
                    </div>`;
                });

                let opdCard = document.createElement('div');
                opdCard.className = 'opd-card';
                opdCard.innerHTML = `
                <div class="opd-main-info">
                    <div class="opd-logo-cell">
                        <img class="opd-logo" src="${namaFileLogo}.png" alt="Logo ${namaOPD}" onerror="this.onerror=null; this.src='https://placehold.co/70x70?text=${inisial}';">
                    </div>
                    <div class="opd-details-cell">
                        <div class="opd-title">${namaOPD}</div>
                        <div class="opd-meta">
                            Pagu: <span class="pagu-total">${totalPaguOPD}</span> &bull; <span>${listKegiatan.length} Kegiatan</span>
                        </div>
                    </div>
                    <div class="opd-action-cell">
                        <button class="btn btn-primary" onclick="toggleOPD(this, 'list-${idOPD}')">Detail</button>
                    </div>
                </div>
                <div id="list-${idOPD}" class="kegiatan-container" style="display:none;">
                    ${kegiatanHtml}
                </div>`;
                mainContent.appendChild(opdCard);
            });

            const splashScreen = document.getElementById('splashScreen');
            if (splashScreen && splashScreen.style.display === 'none') {
                picuAnimasiDanSuaraKartu();
            }
        }

        function picuAnimasiDanSuaraKartu() {
            if (animasiKartuSelesai) return;
            const kartuOPD = document.querySelectorAll('.opd-card');
            if (kartuOPD.length === 0) return;

            animasiKartuSelesai = true;

            kartuOPD.forEach((kartu, index) => {
                const jedaWaktu = index * 140; 
                kartu.style.animationDelay = `${jedaWaktu}ms`;
                kartu.classList.add('animasi-jatuh-mantul');
            });
        }

        function mulaiLoadingDashboard(button) {
            try {
                tapSound.currentTime = 0;
                tapSound.play().catch(() => {});
            } catch (err) {}

            button.innerHTML = '<span class="spinner" style="display:inline-block; border-top-color:white;"></span> Tunggu...';
            button.style.background = '#cbd5e1';

            setTimeout(() => {
                bukaDashboardDanHancurkanSplash();
            }, 1200);
        }

        function bukaDashboardDanHancurkanSplash() {
            const splash = document.getElementById('splashScreen');
            if (splash) {
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                setTimeout(() => {
                    splash.style.display = 'none';
                    picuAnimasiDanSuaraKartu();
                }, 500);
            }
            
            const container = document.getElementById('appContainer');
            if (container) container.style.display = 'flex';
        }

        function toggleOPD(button, containerId) {
            var container = document.getElementById(containerId);
            if (container.style.display === "block") {
                container.style.display = "none";
                button.textContent = "Detail";
                button.className = "btn btn-primary";
            } else {
                container.style.display = "block";
                button.textContent = "Tutup";
                button.className = "btn btn-success";
            }
        }

        function toggleSubDetail(button) {
            var kegiatanCard = button.closest('.kegiatan-card');
            var subDetail = kegiatanCard.querySelector('.kegiatan-sub-detail');
            if (subDetail.style.display === "block") {
                subDetail.style.display = "none";
                button.textContent = "Detail";
                button.className = "btn btn-orange";
            } else {
                document.querySelectorAll('.kegiatan-sub-detail').forEach(el => el.style.display = 'none');
                document.querySelectorAll('.kegiatan-action-cell .btn').forEach(btn => {
                    if (btn.classList.contains('btn-success')) {
                        btn.textContent = "Detail";
                        btn.className = "btn btn-orange";
                    }
                });
                subDetail.style.display = "block";
                button.textContent = "Tutup";
                button.className = "btn btn-success";
            }
        }

        function toggleFilterPanel() {
            var panel = document.getElementById('filterPanel');
            var btn = document.getElementById('filterToggleBtn');
            if (panel.style.display === "block") {
                panel.style.display = "none";
                btn.classList.remove('active');
            } else {
                panel.style.display = "block";
                btn.classList.add('active');
            }
        }

        // Suara Efek Klik Layar Global Pasif
        document.addEventListener("click", (e) => {
            if(e.target.classList.contains('btn-masuk')) return;
            const now = Date.now();
            if (now - lastPlayTime < 250) return;
            lastPlayTime = now;
            
            tapSound.currentTime = 0;
            tapSound.play().catch(() => { });
        });

        // =======================================================
        // TAMBAL SULAM ENGINE (MENYUNTIK FITUR TANPA MENGUBAH)
        // =======================================================
        const TambalSulamHelper = {
            sulamSetelah(namaFungsiAsli, fungsiTambahanBaru) {
                if (typeof window[namaFungsiAsli] !== 'function') return;
                const fungsiLama = window[namaFungsiAsli];
                window[namaFungsiAsli] = function(...args) {
                    const hasil = fungsiLama.apply(this, args);
                    fungsiTambahanBaru(...args);
                    return hasil;
                };
            }
        };

        // 1. Sulam Suara Beruntun (Berjalan setelah Splash Screen Hancur)
        TambalSulamHelper.sulamSetelah('bukaDashboardDanHancurkanSplash', function() {
            const audioBeruntun = new Audio("tap_sound.mp3");
            audioBeruntun.volume = 0.35;
            document.querySelectorAll('.opd-card').forEach((kartu, index) => {
                setTimeout(() => {
                    const klon = audioBeruntun.cloneNode();
                    klon.play().catch(() => {});
                }, index * 140 + 320);
            });
        });

        // 2. Sulam Fitur Pencarian & Multi-Filter Pasif (Berjalan setelah Render Data Selesai)
        TambalSulamHelper.sulamSetelah('renderData', function() {
            const inputCari = document.getElementById('searchInput');
            const selectMetode = document.getElementById('filterMetode');
            const selectKontrak = document.getElementById('filterKontrak');

            function jalankanMultiFilterPasif() {
                let kataKunci = inputCari.value.toLowerCase().trim();
                let fMetode = selectMetode.value.toLowerCase().trim();
                let fKontrak = selectKontrak.value.toLowerCase().trim();
                let kartuOPD = document.querySelectorAll('.opd-card');

                kartuOPD.forEach(opdCard => {
                    let containerKegiatan = opdCard.querySelector('.kegiatan-container');
                    let tombolOPD = opdCard.querySelector('.opd-action-cell button');
                    let daftarKegiatan = opdCard.querySelectorAll('.kegiatan-card');
                    let adaKegiatanCocok = false;

                    daftarKegiatan.forEach(card => {
                        let namaKegiatan = card.getAttribute('data-nama') || "";
                        let metodeKegiatan = card.getAttribute('data-metode') || "";
                        let kontrakKegiatan = card.getAttribute('data-kontrak') || "";

                        let cocokKeyword = (kataKunci === "" || namaKegiatan.includes(kataKunci));
                        let cocokMetode = (fMetode === "" || metodeKegiatan.includes(fMetode));
                        let cocokKontrak = (fKontrak === "" || kontrakKegiatan.includes(fKontrak));

                        if (cocokKeyword && cocokMetode && cocokKontrak) {
                            card.style.display = ""; // Kembalikan ke setelan dasar asli Code 1
                            adaKegiatanCocok = true;
                        } else {
                            card.style.display = "none";
                        }
                    });

                    // Logika Visibilitas Kontainer yang menghormati Layout Alami Code 1
                    if (kataKunci === "" && fMetode === "" && fKontrak === "") {
                        opdCard.style.display = "";
                        containerKegiatan.style.display = "none";
                        tombolOPD.textContent = "Detail";
                        tombolOPD.className = "btn btn-primary";
                    } else if (adaKegiatanCocok) {
                        opdCard.style.display = "";
                        containerKegiatan.style.display = "block";
                        tombolOPD.textContent = "Tutup";
                        tombolOPD.className = "btn btn-success";
                    } else {
                        opdCard.style.display = "none";
                    }
                });
            }

            // Daftarkan trigger event secara mandiri dari luar
            if (inputCari) inputCari.addEventListener('keyup', jalankanMultiFilterPasif);
            if (selectMetode) selectMetode.addEventListener('change', jalankanMultiFilterPasif);
            if (selectKontrak) selectKontrak.addEventListener('change', jalankanMultiFilterPasif);
        });
    </script>
</body>
</html>
